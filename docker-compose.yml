services:
  db:
    image: postgres:16-alpine
    container_name: baisakh_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       pohela_baisakh_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pohela_baisakh_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: baisakh_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pohela_baisakh_db?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
